dataset:
  type: zinc20
  files:
    - data/raw/zinc20/smiles_BCAA.txt
    - data/raw/zinc20/smiles_BCAB.txt

tokenizer:
  type: selfies
  max_length: 156
  meta_path: data/very_big_molecules_selfies_2/meta_chembl_db_aa_2.pkl
  extend_existing_vocab: true


output:
  dir: data/very_big_molecules_selfies_2
  train_file: train_zinc20.bin
  val_file: val_zinc20.bin

split:
  val_fraction: 0.1
  random_state: 42