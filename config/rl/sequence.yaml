# =========================
# MODEL
# =========================
model:
  type: "sequence"
  module: "pockliggpt.models.model_sequence"
  checkpoint_path: "/LUSTRE/users/pvaras/sequence_gpt/out-models/ckpt_zink_chembl_cross_sequence.pt"

# =========================
# DATA
# =========================
data:
  smiles_csv: "datasets/raw/zinc250k/zinc_250k.csv"
  smiles_column: "smiles"

tokenizer:
  meta_path: "datasets/tokenizer/meta_chembl_db_aa_2_proto4.pkl"

# =========================
# RL
# =========================
rl:
  batch_size: 64
  lr: 3e-5
  prompt_batch_size: 256
  num_rollouts: 256
  epochs: 30
  ppo_epochs: 4
  kl_coef: 0.005
  gamma: 0.99
  lam: 0.95
  cliprange: 0.2
  cliprange_value: 0.1
  vf_coef: 1.0

# =========================
# GENERATION
# =========================
generation:
  seq_length: 156
  top_k: 10
  temperature: 0.9

# =========================
# PROMPT
# =========================
prompt:
  format: "pocket_ligand"
  include_pocket_tokens: true
  include_pocket_embedding: false
  initial_ligand_tokens: 7

# =========================
# CONDITIONING
# =========================
conditioning:
  pocket_str: "SER LEU ILE GLY LYS PHE GLN VAL VAL LYS VAL ALA ILE LYS VAL PHE GLU MET LEU SER TYR ASN LEU ASP PRO GLU ASN ILE LEU LEU LYS ILE VAL ASP"

# =========================
# REWARD
# =========================
reward:
  providers:
    - docking

  docking:
    script: "scripts/reward_mgltools_vina.py"
    vars_file: "config/docking/vars_mgltools.json"
    smiles_output_file: "smiles_output.smi"

  combiner: "docking_only"
  results_output_prefix: "reward_results_docking"
# =========================
# SYSTEM
# =========================
system:
  train_device: "cuda:0"
  ref_device: "cuda:1"
  dtype: "bfloat16"

# =========================
# OUTPUT
# =========================
output:
  ppo_ckpt_path: "out-models/ckpt_zink_chembl_cross_sequence_bace.pt"
  loss_history_file: "loss_history_M.txt"
  save_trajectories: true